name: Warm up API

on:
  schedule:
    # 5분마다 실행 (GitHub cron은 UTC 기준)
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # 수동 실행 버튼도 추가

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call warmup endpoint
        env:
          WARM_URL: ${{ secrets.WARM_URL }}
        run: |
          set -e
          echo "Warming: $WARM_URL"

          # 3번 재시도, 10초 타임아웃, 200~399만 성공 처리
          curl -sS -L \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 5 --max-time 10 \
            "$WARM_URL" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"